name: Scraping diario CGR

on:
  schedule:
    - cron: '0 10 * * *'   # 06:00 Chile (UTC-4) = 10:00 UTC
  workflow_dispatch:        # permite ejecución manual

permissions:
  contents: write

jobs:
  scraping:
    runs-on: ubuntu-latest
    env:
      CGR_MODO: completo      # búsqueda de términos CGR + secciones recientes
      CGR_MAX: "40"           # tope de noticias por fuente (acota el tiempo de CI)
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # binarios de Posit Package Manager (instalación rápida)

      - name: Instalar Chrome (para chromote / medios con JavaScript)
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Cache de paquetes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-cgr-${{ hashFiles('instalar_paquetes.R') }}
          restore-keys: ${{ runner.os }}-r-cgr-

      - name: Dependencias del sistema
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libglpk-dev

      - name: Instalar paquetes R
        run: >
          Rscript -e 'pkgs <- c("dplyr","stringr","purrr","tidyr","readr","glue",
          "lubridate","stringi","digest","rvest","polite","httr2","chromote",
          "tidytext","stopwords","SnowballC","arrow","fs","textclean",
          "stm","tm","udpipe","quanteda","igraph");
          faltan <- setdiff(pkgs, rownames(installed.packages()));
          if (length(faltan)) install.packages(faltan)'

      - name: Ejecutar scraping (búsqueda CGR + secciones)
        run: Rscript scraping/cgr_scraping.R

      - name: Procesar (filtrar CGR + tokenizar + conteos + correlación)
        run: Rscript cgr_procesar.R

      - name: Commit y push de datos procesados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos/
          git diff --staged --quiet || git commit -m "Datos CGR $(date +%Y-%m-%d)"
          git push

      - name: Avisar si falla
        if: failure()
        run: echo "::warning title=Scraping CGR::El scraping diario falló el $(date -u)."
