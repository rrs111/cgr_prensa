name: Procesamiento semanal CGR

on:
  schedule:
    - cron: '0 12 * * 0'    # domingos 08:00 Chile (UTC-4) = 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  procesar:
    runs-on: ubuntu-latest
    env:
      CGR_MODO: completo      # búsqueda CGR + secciones (corpus más amplio)
      CGR_MAX: "100"
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar Chrome (para chromote / medios con JavaScript)
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Cache de paquetes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-cgr-${{ hashFiles('instalar_paquetes.R') }}
          restore-keys: ${{ runner.os }}-r-cgr-

      - name: Dependencias del sistema
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libglpk-dev

      - name: Instalar paquetes R
        run: >
          Rscript -e 'pkgs <- c("dplyr","stringr","purrr","tidyr","readr","glue",
          "lubridate","stringi","digest","rvest","polite","httr2","chromote",
          "tidytext","stopwords","SnowballC","arrow","fs","textclean",
          "stm","tm","udpipe","quanteda","igraph");
          faltan <- setdiff(pkgs, rownames(installed.packages()));
          if (length(faltan)) install.packages(faltan)'

      - name: Scraping amplio (búsqueda CGR + secciones)
        run: Rscript scraping/cgr_scraping.R

      - name: Procesamiento completo del pipeline
        run: Rscript cgr_procesar.R

      - name: Commit y push de datos procesados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos/
          git diff --staged --quiet && echo "Sin cambios en datos/" && exit 0
          git commit -m "Procesamiento semanal CGR $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            echo "push rechazado, reintento $i…"; sleep 5
          done
          echo "::error::No se pudo pushear tras 3 intentos"; exit 1

      - name: Avisar si falla
        if: failure()
        run: echo "::warning title=Procesamiento CGR::El procesamiento semanal falló el $(date -u)."
